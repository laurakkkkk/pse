# ════════════════════════════════════════════════════════════════════════════
# Nginx Reverse Proxy — Recargas Nequi PSE
# ────────────────────────────────────────────────────────────────────────────
# Capacidades:
#   • Reverse proxy a Node.js con balanceo entre workers (least_conn).
#   • Soporte WebSocket (Upgrade/Connection) para Socket.IO.
#   • Sticky sessions vía ip_hash (importante para Socket.IO sin Redis adapter).
#   • Rate limiting por IP en dos zonas (general + intensivo) y limit_conn.
#   • Compresión gzip + brotli (si el módulo está disponible).
#   • Headers de seguridad (HSTS, XFO, XCTO, Referrer-Policy, Permissions-Policy).
#   • Ocultación: server_tokens off + cabecera Server reescrita.
#   • Cache estática agresiva para assets (CSS/JS/img) con far-future expires.
#   • SSL/TLS moderno (TLS 1.2 + 1.3, ciphers Mozilla intermediate).
#   • Conexiones tuneadas para 10k+ concurrentes (worker_connections, sendfile, tcp_nopush).
# ════════════════════════════════════════════════════════════════════════════

# ─── Eventos ─────────────────────────────────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections  16384;     # 16k conex simultáneas / worker
    use                 epoll;     # Linux performance
    multi_accept        on;
}

http {
    # ─── Tipos MIME y defaults ──────────────────────────────────────────────
    include         mime.types;
    default_type    application/octet-stream;
    charset         utf-8;

    # ─── Performance core ───────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  10000;
    types_hash_max_size 2048;
    server_tokens       off;       # No exponer versión Nginx

    client_max_body_size      10m;
    client_body_buffer_size   16k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # ─── Logs ───────────────────────────────────────────────────────────────
    log_format  main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for" '
                     'rt=$request_time uct=$upstream_connect_time '
                     'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main  buffer=64k flush=5s;
    error_log   /var/log/nginx/error.log   warn;

    # ─── Compresión gzip ────────────────────────────────────────────────────
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/xml+rss application/xhtml+xml
        application/x-font-ttf font/opentype image/svg+xml image/x-icon;

    # Brotli (descomentar si tu Nginx tiene ngx_brotli compilado)
    # brotli            on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ─── Mapeo Upgrade para WebSocket ───────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── Rate limiting (zonas compartidas) ──────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=req_general:10m rate=60r/s;
    limit_req_zone  $binary_remote_addr zone=req_strict:10m  rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_addr:10m;
    # ─── Bloqueo de métodos HTTP no permitidos ────────────────────
    map $request_method $bad_method {
        default                       1;
        GET                           0;
        HEAD                          0;
        POST                          0;
        OPTIONS                       0;
    }

    # ─── Bloqueo de User-Agents de scanners conocidos ─────────────────
    map $http_user_agent $bad_ua {
        default                       0;
        "~*nikto|sqlmap|acunetix|nessus|nmap|masscan|zgrab"   1;
        "~*dirbuster|gobuster|wfuzz|burpsuite|owasp.zap"      1;
        "~*metasploit|wpscan|nuclei|hakrawler|katana"         1;
        "~*fimap|joomscan|sqlninja|brutus|hydra"              1;
        ""                                                    1;
    }

    # ─── Bloqueo de Referers maliciosos ─────────────────────────
    map $http_referer $bad_referer {
        default                       0;
        "~*(viagra|cialis|porn|casino|loan|gambling)"         1;
    }
    # ─── Upstream a Node.js (cluster con N workers) ─────────────────────────
    # Si usas cluster.js Node comparte el mismo puerto vía shared handle,
    # entonces un solo target basta. Si lanzas múltiples instancias en distintos
    # puertos, listalos aquí.
    upstream node_app {
        # Sticky por IP → asegura que el mismo cliente vaya al mismo worker
        # (importante para Socket.IO si NO usas Redis adapter).
        ip_hash;

        server 127.0.0.1:3000  max_fails=3 fail_timeout=30s;
        # server 127.0.0.1:3001  max_fails=3 fail_timeout=30s;
        # server 127.0.0.1:3002  max_fails=3 fail_timeout=30s;
        # server 127.0.0.1:3003  max_fails=3 fail_timeout=30s;

        keepalive 256;             # Pool de conexiones reutilizables
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # ─── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        # ACME challenge para Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Servidor HTTPS principal ───────────────────────────────────────────
    server {
        listen      443 ssl http2 default_server;
        listen      [::]:443 ssl http2 default_server;
        server_name _;             # Cambiar por el dominio real

        # SSL/TLS (rutas estándar — ajustar a tu certificado real)
        ssl_certificate         /etc/letsencrypt/live/SU_DOMINIO/fullchain.pem;
        ssl_certificate_key     /etc/letsencrypt/live/SU_DOMINIO/privkey.pem;
        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache       shared:SSL:50m;
        ssl_session_timeout     1d;
        ssl_session_tickets     off;
        ssl_stapling            on;
        ssl_stapling_verify     on;
        ssl_dhparam             /etc/letsencrypt/dhparam.pem;     # generar: openssl dhparam -out dhparam.pem 4096
        resolver                1.1.1.1 8.8.8.8 valid=300s ipv6=off;
        resolver_timeout        5s;

        # ─── Bloqueo temprano de scanners / métodos raros ─────────────────
        if ($bad_method) { return 405; }
        if ($bad_ua)     { return 444; }   # 444: cierra conexión sin respuesta
        if ($bad_referer){ return 444; }

        # ─── Headers de seguridad MÁXIMOS (Safe Browsing / Mozilla A+) ──────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header X-Robots-Tag              "index, follow" always;
        add_header Expect-CT                 "max-age=86400, enforce" always;

        # ─── Ocultar firma del backend ──────────────────────────────────────
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        more_clear_headers Server;          # Requiere headers-more-nginx-module
        # Si no tienes headers-more, comenta la línea anterior y deja:
        # server_tokens off;  (ya está en http{})

        # ─── Límite de conexiones concurrentes por IP ──────────────────────
        limit_conn conn_addr 50;

        # ─── Assets estáticos (cache agresivo) ──────────────────────────────
        location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
            proxy_pass http://node_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            access_log off;
        }

        # ─── WebSocket / Socket.IO ──────────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://node_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         $connection_upgrade;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;

            proxy_buffering    off;             # Streaming
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            limit_req zone=req_general burst=120 nodelay;
        }

        # ─── Health check (sin rate limit, sin log) ─────────────────────────
        location = /health {
            proxy_pass http://node_app;
            access_log off;
        }

        # ─── App principal ──────────────────────────────────────────────────
        location / {
            proxy_pass         http://node_app;
            proxy_http_version 1.1;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   Connection         "";

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            limit_req zone=req_general burst=120 nodelay;
        }

        # ─── Bloquear paths sensibles ───────────────────────────────────────
        location ~ /\.(?!well-known) {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* /(node_modules|\.git|package\.json|package-lock\.json|server\.js|cluster\.js)(/|$) {
            deny all;
            return 404;
        }
    }
}
